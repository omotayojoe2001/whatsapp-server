app = "gooddeeds-whatsapp"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3100"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
